<!DOCTYPE html>
<html>
  <body>
    <h2>설문 CSV 업로드</h2>

    <input type="file" id="codebookFile" accept=".csv" />
    <input type="file" id="valueFile" accept=".csv" />
    <input type="file" id="labelFile" accept=".csv" />

    <button id="uploadBtn">업로드 & 저장</button>

    <script type="module">
      import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
      import Papa from 'https://cdn.jsdelivr.net/npm/papaparse@5.4.1/+esm'

      const supabase = createClient(
        'https://anryotqsnrhsonpsrdbw.supabase.co',
        'sb_publishable_1hDV_KyYG9qYVR2J-_3iSA_7VTUf9wY'
      )

      let codebookData, responseValueData, responseLabelData

      function parseCSV(file) {
        return new Promise((resolve) => {
          Papa.parse(file, {
            header: true,
            skipEmptyLines: true,
            complete: (results) => resolve(results.data)
          })
        })
      }

      document.getElementById('uploadBtn').onclick = async () => {
        const codebookFile = document.getElementById('codebookFile').files[0]
        const valueFile = document.getElementById('valueFile').files[0]
        const labelFile = document.getElementById('labelFile').files[0]

        if (!codebookFile || !valueFile || !labelFile) {
          alert('CSV 3개 다 선택해줘')
          return
        }

        // 🔥 CSV → JSON 변환
        codebookData = await parseCSV(codebookFile)
        responseValueData = await parseCSV(valueFile)
        responseLabelData = await parseCSV(labelFile)

        console.log('parsed:', codebookData, responseValueData, responseLabelData)

        // 🔥 Supabase 저장
        const { data, error } = await supabase
          .from('dashboard_for_survey')
          .insert({
            title: '설문 프로젝트',
            codebook: codebookData,
            responsedata_value: responseValueData,
            responsedata_label: responseLabelData
          })
          .select('*')

        console.log('insert:', data, error)

        if (!error) {
          alert('저장 완료!')
        }
      }
    </script>
  </body>
</html>
